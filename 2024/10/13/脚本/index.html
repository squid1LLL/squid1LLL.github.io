                <h3 id="BASE64隐写"><a href="#BASE64隐写" class="headerlink" title="BASE64隐写"></a>BASE64隐写</h3><figure class="highlight vim"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><code class="hljs vim">import base64<br><br>b64chars = <span class="hljs-string">&#x27;ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/&#x27;</span><br><br>with <span class="hljs-keyword">open</span>(<span class="hljs-string">&#x27;flag.txt&#x27;</span>, <span class="hljs-string">&#x27;rb&#x27;</span>) <span class="hljs-keyword">as</span> <span class="hljs-keyword">f</span>:<br>    bin_str = <span class="hljs-string">&#x27;&#x27;</span><br>    <span class="hljs-keyword">for</span> <span class="hljs-built_in">line</span> in <span class="hljs-keyword">f</span>.readlines():<br>        line_str = <span class="hljs-built_in">line</span>.decode(<span class="hljs-string">&#x27;utf-8&#x27;</span>).strip()  # Decode bytes <span class="hljs-keyword">to</span> <span class="hljs-built_in">string</span> <span class="hljs-built_in">and</span> <span class="hljs-built_in">remove</span> leading/trailing whitespaces<br>        stegb64 = <span class="hljs-string">&#x27;&#x27;</span>.<span class="hljs-keyword">join</span>(line_str.<span class="hljs-keyword">split</span>())<br>        padding_needed = <span class="hljs-built_in">len</span>(stegb64) % <span class="hljs-number">4</span><br>        <span class="hljs-keyword">if</span> padding_needed &gt; <span class="hljs-number">0</span>:<br>            stegb64 += <span class="hljs-string">&#x27;=&#x27;</span> * (<span class="hljs-number">4</span> - padding_needed)  # Add padding characters <span class="hljs-keyword">if</span> needed<br>        <span class="hljs-keyword">try</span>:<br>            rowb64 = base64.b64encode(base64.b64decode(stegb64)).decode()<br>            offset = <span class="hljs-built_in">abs</span>(b64chars.<span class="hljs-built_in">index</span>(stegb64.replace(<span class="hljs-string">&#x27;=&#x27;</span>, <span class="hljs-string">&#x27;&#x27;</span>)[-<span class="hljs-number">1</span>]) - b64chars.<span class="hljs-built_in">index</span>(rowb64.replace(<span class="hljs-string">&#x27;=&#x27;</span>, <span class="hljs-string">&#x27;&#x27;</span>)[-<span class="hljs-number">1</span>]))<br>            equalnum = stegb64.<span class="hljs-built_in">count</span>(<span class="hljs-string">&#x27;=&#x27;</span>)  # Count the <span class="hljs-keyword">number</span> of padding characters<br>            <span class="hljs-keyword">if</span> equalnum:<br>                bin_str += bin(offset)[<span class="hljs-number">2</span>:].zfill(equalnum * <span class="hljs-number">2</span>)<br>        except base64.binascii.Error <span class="hljs-keyword">as</span> <span class="hljs-keyword">e</span>:<br>            <span class="hljs-keyword">print</span>(<span class="hljs-keyword">f</span><span class="hljs-string">&quot;Error decoding base64 string: &#123;e&#125;&quot;</span>)<br><br>    # Convert binary <span class="hljs-built_in">string</span> <span class="hljs-keyword">to</span> ASCII characters <span class="hljs-built_in">and</span> <span class="hljs-keyword">print</span><br>    ascii_str = <span class="hljs-string">&#x27;&#x27;</span>.<span class="hljs-keyword">join</span>([chr(<span class="hljs-keyword">int</span>(bin_str[i:i + <span class="hljs-number">8</span>], <span class="hljs-number">2</span>)) <span class="hljs-keyword">for</span> i in <span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-built_in">len</span>(bin_str), <span class="hljs-number">8</span>)])<br>    <span class="hljs-keyword">print</span>(ascii_str)<br></code></pre></td></tr></table></figure>

<h3 id="TTL隐写"><a href="#TTL隐写" class="headerlink" title="TTL隐写"></a>TTL隐写</h3><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;F:\misc题目下载\\attachment-2.txt&quot;</span>) <span class="hljs-keyword">as</span> f:<br>    lines = f.readlines()<br>n_num = []<br><span class="hljs-comment"># 分析出所有的数</span><br><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> lines:<br>    <span class="hljs-keyword">if</span> i != <span class="hljs-string">&#x27;\n&#x27;</span>:<br>        n_num.append(<span class="hljs-built_in">int</span>(i))<br><span class="hljs-comment"># 拿到每个TTL值的高位</span><br>rlt = <span class="hljs-string">&#x27;&#x27;</span><br><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-built_in">len</span>(lines)):<br>    tmp = <span class="hljs-built_in">bin</span>(n_num[i])[<span class="hljs-number">2</span>:]<br>    tmp = <span class="hljs-string">&#x27;0&#x27;</span> * (<span class="hljs-number">8</span> - <span class="hljs-built_in">len</span>(tmp)) + tmp<br>    rlt += tmp[<span class="hljs-number">0</span>:<span class="hljs-number">2</span>]<br><span class="hljs-comment"># 得到最终的结果并存到文件中</span><br>rlt2 = <span class="hljs-string">&#x27;&#x27;</span><br><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-built_in">len</span>(rlt), <span class="hljs-number">8</span>):<br>    rlt2 += <span class="hljs-built_in">chr</span>(<span class="hljs-built_in">int</span>(rlt[i:i + <span class="hljs-number">8</span>], <span class="hljs-number">2</span>))<br><span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(<span class="hljs-string">&#x27;input.txt&#x27;</span>, <span class="hljs-string">&#x27;w&#x27;</span>) <span class="hljs-keyword">as</span> f:<br>    f.write(rlt2.rstrip())<br></code></pre></td></tr></table></figure>

<h3 id="时间戳"><a href="#时间戳" class="headerlink" title="时间戳"></a>时间戳</h3><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">import</span> rarfile<br><span class="hljs-keyword">import</span> os<br><br><span class="hljs-comment"># 获取当前目录下的第一个 .rar 文件</span><br>files = os.listdir(os.getcwd())<br>filename = <span class="hljs-built_in">next</span>((i <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> files <span class="hljs-keyword">if</span> i.endswith(<span class="hljs-string">&quot;.rar&quot;</span>)), <span class="hljs-literal">None</span>)<br><br><span class="hljs-keyword">if</span> filename <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;没有找到 .rar 文件&quot;</span>)<br><span class="hljs-keyword">else</span>:<br>    rarf = rarfile.RarFile(filename)<br>    flag = <span class="hljs-string">&#x27;&#x27;</span><br>    <span class="hljs-built_in">dict</span> = &#123;&#125;<br><br>    <span class="hljs-comment"># 读取每个 .txt 文件的日期时间信息并生成对应的字符</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">18</span>):<br>        name = <span class="hljs-string">f&#x27;<span class="hljs-subst">&#123;filename[:-<span class="hljs-number">4</span>]&#125;</span>/.<span class="hljs-subst">&#123;i&#125;</span>.txt&#x27;</span><br>        info = rarf.getinfo(name)<br>        datetime = info.date_time<br>        out = datetime[-<span class="hljs-number">2</span>] * <span class="hljs-number">60</span> + datetime[-<span class="hljs-number">1</span>]<br>        <span class="hljs-built_in">dict</span>[i] = <span class="hljs-built_in">chr</span>(out)<br><br>    <span class="hljs-built_in">print</span>(<span class="hljs-built_in">dict</span>)<br><br>    <span class="hljs-comment"># 生成最终的 flag</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">18</span>):<br>        flag += <span class="hljs-built_in">dict</span>[i]<br><br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;ISCC&#123;&#x27;</span> + flag + <span class="hljs-string">&#x27;&#125;&#x27;</span>)<br><br></code></pre></td></tr></table></figure>
